<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My Maki Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        button {
            color:aqua;
            background-color: #000;
            border-color: rgb(137, 137, 205);
            border-radius: 2px;
            padding: 3px;
            font-size: larger;
            font-weight: bolder;
            cursor: pointer;
        }
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>
    <button id="reveal">Reveal walls (5s)</button>    
    <button onclick="window.location.reload()">New Game</button>

    <script type="module" src="./game.js"></script>
</body>
</html>
